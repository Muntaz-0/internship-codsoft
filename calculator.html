<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Calculator - 100 lines</title>
<style>
:root{--bg:#0f1724;--panel:#111827;--btn:#1f2937;--acc:#f59e0b;--txt:#e5e7eb}
*{box-sizing:border-box}
body{margin:0;height:100vh;display:grid;place-items:center;background:linear-gradient(180deg,#020617, #071129);font-family:system-ui,Arial}
.cal{width:320px;background:linear-gradient(180deg,var(--panel),#0b1220);padding:16px;border-radius:12px;color:var(--txt);box-shadow:0 8px 30px rgba(2,6,23,0.6)}
.display{background:rgba(255,255,255,0.03);padding:12px;border-radius:8px;text-align:right;margin-bottom:12px}
.prev{font-size:12px;color:rgba(229,231,235,0.6);min-height:14px}
.curr{font-size:28px;font-weight:600;min-height:30px}
.keys{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
button{height:52px;border-radius:8px;border:0;background:var(--btn);color:var(--txt);font-size:18px;cursor:pointer}
.op{background:linear-gradient(180deg,#ffd8a6,var(--acc));color:#111}
.wide{grid-column:span 2}
.clear{background:#6b7280}
.del{background:#ef4444}
@media(max-width:360px){.cal{width:92%}}
</style>
</head>
<body>
<div class="cal" role="application" aria-label="Calculator">
  <div class="display">
    <div class="prev" id="prev"></div>
    <div class="curr" id="curr">0</div>
  </div>
  <div class="keys" id="keys">
    <button class="clear wide" data-action="clear">C</button>
    <button class="del" data-action="del">DEL</button>
    <button class="op" data-action="op">/</button>

    <button data-action="num">7</button>
    <button data-action="num">8</button>
    <button data-action="num">9</button>
    <button class="op" data-action="op">*</button>

    <button data-action="num">4</button>
    <button data-action="num">5</button>
    <button data-action="num">6</button>
    <button class="op" data-action="op">-</button>

    <button data-action="num">1</button>
    <button data-action="num">2</button>
    <button data-action="num">3</button>
    <button class="op" data-action="op">+</button>

    <button data-action="num">0</button>
    <button data-action="dot">.</button>
    <button class="wide op" data-action="eq">=</button>
  </div>
</div>
<script>
// 100-line compact calculator script
(function(){
const prevEl=document.getElementById('prev'),currEl=document.getElementById('curr'),keys=document.getElementById('keys');
let prev='',curr='0',op=null,justEvaluated=false;
function upd(){prevEl.textContent=prev+(op?(' '+op):'');currEl.textContent=curr}
function clearAll(){prev='';curr='0';op=null;justEvaluated=false;upd()}
function del(){if(justEvaluated){clearAll();return}curr=curr.length>1?curr.slice(0,-1):'0';upd()}
function num(n){if(justEvaluated){curr='0';justEvaluated=false}if(curr==='0')curr=n;else curr+=n;upd()}
function dot(){if(justEvaluated){curr='0';justEvaluated=false}if(!curr.includes('.'))curr+='.';upd()}
function choose(o){if(op&&prev!=='')compute();prev=curr;curr='0';op=o;justEvaluated=false;upd()}
function compute(){if(!op||prev==='')return;const a=parseFloat(prev),b=parseFloat(curr);if(isNaN(a)||isNaN(b))return;let r;if(op==='+')r=a+b;else if(op==='-')r=a-b;else if(op==='*')r=a*b;else if(op==='/'){r=b===0?'Error':a/b}
curr=(r==='Error'?r:String(Number((r).toFixed(10))));prev='';op=null;justEvaluated=true;upd()}
keys.addEventListener('click',e=>{const btn=e.target.closest('button');if(!btn)return;const a=btn.dataset.action,v=btn.textContent;
if(a==='num')num(v);else if(a==='dot')dot();else if(a==='clear')clearAll();else if(a==='del')del();else if(a==='op')choose(v);else if(a==='eq')compute();});
window.addEventListener('keydown',e=>{const k=e.key;if(k>='0'&&k<='9')num(k);else if(k==='.')dot();else if(['+','-','*','/'].includes(k))choose(k);else if(k==='Enter'||k==='=')compute();else if(k==='Backspace')del();else if(k.toLowerCase()==='c')clearAll();});
upd();
})();
</script>
</body>
</html>
